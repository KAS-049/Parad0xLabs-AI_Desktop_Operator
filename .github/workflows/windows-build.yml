name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      package_windows:
        description: Build Windows package artifact
        required: false
        default: "false"

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  package-windows:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_windows == 'true' }}
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows build
        run: npm run package:win

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-avatar-windows
          path: |
            dist/**
